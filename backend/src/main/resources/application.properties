# ══════════════════════════════════════════════════════════════════════
#  application.properties — College ERP Backend
#  Environment variable references read from .env or system environment.
# ══════════════════════════════════════════════════════════════════════

# ─── Server ───────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ─── Application Name ─────────────────────────────────────────────────
spring.application.name=college-erp-backend

# ─── PostgreSQL (Supabase) ────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Firebase ─────────────────────────────────────────────────────────
firebase.project-id=${FIREBASE_PROJECT_ID}
firebase.private-key=${FIREBASE_PRIVATE_KEY}
firebase.client-email=${FIREBASE_CLIENT_EMAIL}

# ─── JWT ──────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ─── Cloudinary ───────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ─── File Upload Limits ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Logging ──────────────────────────────────────────────────────────
logging.level.com.collegeerp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
